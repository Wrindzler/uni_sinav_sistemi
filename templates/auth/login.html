{% extends "base.html" %}

{% block title %}Giriş yap - Üniversite Sınav Programı{% endblock %}

{% block login_content %}
<div class="row justify-content-center" style="min-height: 100vh; align-items: center;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <img src="/kostu.png" alt="KOSTÜ Logo" style="height: 80px; margin-bottom: 20px;">
        </div>
        <div class="card" style="border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.1); border-top: 4px solid #1B365D;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 style="color: #1E293B; font-weight: 700;">Giriş yap</h2>
                    <p style="color: #64748B; font-size: 0.9rem;">Üniversite Sınav Programı Sistemine Hoş Geldiniz</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="kullanici_adi" class="form-label" style="color: #1E293B; font-weight: 500;">
                            <i class="bi bi-person"></i> Kullanıcı adı
                        </label>
                        <input type="text" class="form-control form-control-lg" id="kullanici_adi" 
                               name="kullanici_adi" required autofocus style="border-radius: 8px;">
                    </div>
                    
                    <div class="mb-4">
                        <label for="sifre" class="form-label" style="color: #1E293B; font-weight: 500;">
                            <i class="bi bi-lock"></i> Şifre
                        </label>
                        <input type="password" class="form-control form-control-lg" id="sifre" 
                               name="sifre" required style="border-radius: 8px;">
                    </div>
                    
                    <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #1B365D 0%, #0EA5E9 100%); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: 600;">
                        <i class="bi bi-box-arrow-in-right"></i> Giriş yap
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <small style="color: #64748B;">
                        Varsayılan admin: <strong>admin</strong> / <strong>admin123</strong>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
