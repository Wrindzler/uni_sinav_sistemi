{% extends "base.html" %}

{% block title %}Raporlar - Üniversite Sınav Programı{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">
            <i class="bi bi-file-earmark-text"></i> Raporlar
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">
                    <i class="bi bi-funnel"></i> Rapor Filtreleri
                </h5>
            </div>
            <div class="card-body">
                <form id="raporForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Fakülte</label>
                            <select name="fakulte_id" class="form-select">
                                <option value="">Tümü</option>
                                {% for fakulte in fakulteler %}
                                <option value="{{ fakulte.id }}">{{ fakulte.ad }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Bölüm</label>
                            <select name="bolum_id" class="form-select">
                                <option value="">Tümü</option>
                                {% for bolum in bolumler %}
                                <option value="{{ bolum.id }}">{{ bolum.ad }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Başlangıç Tarihi</label>
                            <input type="date" name="baslangic_tarihi" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Bitiş Tarihi</label>
                            <input type="date" name="bitis_tarihi" class="form-control">
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="#" id="pdfLink" class="btn btn-danger btn-lg me-2">
                            <i class="bi bi-file-pdf"></i> PDF İndir
                        </a>
                        <a href="#" id="excelLink" class="btn btn-success btn-lg">
                            <i class="bi bi-file-excel"></i> Excel İndir
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('raporForm');
    const pdfLink = document.getElementById('pdfLink');
    const excelLink = document.getElementById('excelLink');
    
    function updateLinks() {
        const formData = new FormData(form);
        const params = new URLSearchParams();
        
        for (const [key, value] of formData.entries()) {
            if (value) {
                params.append(key, value);
            }
        }
        
        const queryString = params.toString();
        pdfLink.href = '{{ url_for("rapor.pdf") }}' + (queryString ? '?' + queryString : '');
        excelLink.href = '{{ url_for("rapor.excel") }}' + (queryString ? '?' + queryString : '');
    }
    
    form.addEventListener('change', updateLinks);
    updateLinks();
});
</script>
{% endblock %}
